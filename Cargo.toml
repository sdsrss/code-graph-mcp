[package]
name = "code-graph-mcp"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.38", features = ["bundled-full"] }
blake3 = "1"
ignore = "0.4"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
bytemuck = "1"

[dev-dependencies]
tempfile = "3"
